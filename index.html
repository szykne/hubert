<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wesele Ani i Tomka - Prześlij zdjęcia</title>
    
    <!-- Import eleganckiej czcionki -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* === ZMIENNE KOLORYSTYCZNE === */
        :root {
            --bg-color: #FAF9F6;      /* Jasny beż / złamana biel */
            --text-color: #2C2C2C;    /* Głęboka szarość */
            --accent-color: #D4AF37;  /* Eleganckie złoto */
            --font-main: 'Montserrat', sans-serif;
        }

        /* === RESET I BAZOWE STYLE === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* === NAGŁÓWEK WESELNY === */
        header {
            margin-top: 40px;
            margin-bottom: 40px;
            animation: fadeIn 1s ease-in-out;
        }

        header h1 {
            font-weight: 600;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        header p {
            font-weight: 300;
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* === KONTENERY WIDOKÓW === */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        /* === ELEMENTY FORMULARZA === */
        .input-group {
            width: 100%;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            font-family: var(--font-main);
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        /* === PRZYCISKI === */
        .btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-main);
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-upload {
            padding: 25px 20px;
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* === PASEK POSTĘPU === */
        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            overflow: hidden;
            height: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.1s;
        }

        .status-text {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        /* === ANIMACJE === */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- NAGŁÓWEK (Edytuj te teksty!) -->
    <header>
        <h1>Sylwia & Jakub</h1>
        <p>27.06.2026</p>
    </header>

    <!-- KROK 1: EKRAN LOGOWANIA -->
    <div id="login-screen" class="screen">
        <p style="margin-bottom: 20px;">Zanim prześlesz zdjęcia, powiedz nam, kim jesteś!</p>
        <div class="input-group">
            <input type="text" id="guest-name" placeholder="Wpisz Imię i Nazwisko">
        </div>
        <button class="btn" id="btn-save-name">Zatwierdź</button>
    </div>

    <!-- KROK 2: EKRAN GŁÓWNY -->
    <div id="app-screen" class="screen">
        <p style="margin-bottom: 30px; font-size: 18px;">
            Witaj, <strong id="display-name">Gościu</strong>!<br>
            Czekamy na Twoje ujęcia!
        </p>

        <!-- Ukryty natywny uploader, sterowany za pomocą eleganckiego przycisku poniżej -->
        <input type="file" id="native-file-input" accept="image/*" style="display: none;">
        
        <button class="btn btn-upload" id="btn-trigger-upload">Zrób zdjęcie lub wybierz z galerii</button>
        
        <p id="limit-info" style="font-size: 14px; color: #666;"></p>

        <!-- Pasek postępu wysyłania -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p class="status-text" id="status-text"></p>
    </div>

    <script>
        // ==========================================
        // KONFIGURACJA GŁÓWNA IMGBB
        // ==========================================
        const IMGBB_API_KEY = '0feacf894850b901dc9b7803b5093d05'; 
        const MAX_PHOTOS = 5; // Ustaw 0, jeśli zdjęcia mają być bez limitów

        // Referencje HTML
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const nameInput = document.getElementById('guest-name');
        const saveNameBtn = document.getElementById('btn-save-name');
        const displayName = document.getElementById('display-name');
        const triggerBtn = document.getElementById('btn-trigger-upload');
        const fileInput = document.getElementById('native-file-input');
        const limitInfo = document.getElementById('limit-info');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');

        // Funkcja inicjalizująca aplikację
        function initApp() {
            const savedName = localStorage.getItem('guestName');
            if (savedName) {
                displayName.textContent = savedName;
                loginScreen.classList.remove('active');
                appScreen.classList.add('active');
                updateLimitUI();
            } else {
                loginScreen.classList.add('active');
            }
        }

        // Zapisywanie imienia
        saveNameBtn.addEventListener('click', () => {
            const nameValue = nameInput.value.trim();
            if (nameValue.length > 2) {
                localStorage.setItem('guestName', nameValue);
                initApp(); 
            } else {
                alert("Proszę wpisać poprawne imię i nazwisko.");
            }
        });

        // Licznik limitu zdjęć
        function getUploadedCount() {
            return parseInt(localStorage.getItem('uploadedPhotosCount') || '0');
        }

        function updateLimitUI() {
            const count = getUploadedCount();
            if (MAX_PHOTOS > 0) {
                limitInfo.textContent = `Wysłano: ${count} / ${MAX_PHOTOS}`;
                if (count >= MAX_PHOTOS) {
                    triggerBtn.disabled = true;
                    triggerBtn.textContent = "Osiągnięto limit. Dziękujemy!";
                } else {
                    triggerBtn.disabled = false;
                    triggerBtn.textContent = "Zrób zdjęcie lub wybierz z galerii";
                }
            } else {
                limitInfo.textContent = `Wysłano zdjęć: ${count}`;
            }
        }

        // Kliknięcie w nasz przycisk aktywuje ukryte pole systemowe
        triggerBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // Reakcja na wybranie pliku / zrobienie zdjęcia
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            // Sprawdzenie limitu przed rozpoczęciem wysyłania
            if (MAX_PHOTOS > 0 && getUploadedCount() >= MAX_PHOTOS) {
                alert("Osiągnąłeś już swój limit zdjęć.");
                return;
            }

            // Przygotowanie danych do wysyłki przez FormData
            const formData = new FormData();
            formData.append('image', file);

            // Pokazanie paska ładowania
            progressContainer.style.display = 'block';
            statusText.textContent = "Wysyłanie zdjęcia na serwer...";
            triggerBtn.style.display = 'none';

            // Używamy XMLHttpRequest, aby precyzyjnie śledzić pasek postępu (Progress Bar)
            const xhr = new XMLHttpRequest();
            xhr.open('POST', `https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`);

            // Aktualizacja paska postępu w czasie rzeczywistym
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percent + '%';
                }
            });

            // Obsługa zakończenia wysyłania
            xhr.onload = () => {
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    
                    // Sukces! Tutaj w response.data.url masz bezpośredni link do zdjęcia
                    console.log("Zdjęcie zapisane pod adresem:", response.data.url);
                    
                    statusText.textContent = "Zdjęcie wysłane pomyślnie! Dziękujemy!";
                    
                    // Zwiększenie licznika w LocalStorage
                    let count = getUploadedCount();
                    localStorage.setItem('uploadedPhotosCount', count + 1);
                } else {
                    statusText.textContent = "Wystąpił błąd po stronie serwera.";
                }

                // Resetowanie widoku po zakończeniu akcji
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressBar.style.width = '0%';
                    statusText.textContent = "";
                    triggerBtn.style.display = 'block';
                    fileInput.value = ""; // Czyszczenie uploada
                    updateLimitUI();
                }, 2500);
            };

            // Obsługa błędów sieciowych
            xhr.onerror = () => {
                statusText.textContent = "Błąd połączenia sieciowego.";
                triggerBtn.style.display = 'block';
                progressContainer.style.display = 'none';
            };

            // Wysłanie pliku
            xhr.send(formData);
        });

        // Uruchomienie skryptu
        initApp();
    </script>
</body>
</html>
